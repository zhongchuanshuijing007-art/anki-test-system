<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>先生ページ</title>

<style>

body{
font-family:sans-serif;
padding:10px;
}

input,button{
padding:10px;
font-size:16px;
margin:4px 0;
width:100%;
max-width:300px;
}

table{
width:100%;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>先生ページ</h1>

<div id="loginArea">

<h2>先生ログイン</h2>

<input id="teacherPass" type="password" placeholder="パスワード">

<button onclick="teacherLogin()">ログイン</button>

</div>

<div id="teacherArea" class="hidden">

<h2>科目設定</h2>

<input id="subjectName" placeholder="科目名（社会など）">

<button onclick="setSubject()">科目設定</button>

<p>現在：<span id="currentSubject">未設定</span></p>

<h2>問題追加</h2>

<input id="unit" placeholder="単元（江戸時代など）">

<input id="questionText" placeholder="問題">

<input id="answerText" placeholder="正解（カンマ区切り）">

<button onclick="addQuestion()">問題追加</button>


<h2>問題一覧</h2>

<ul id="questionList"></ul>


<h2>生徒追加</h2>

<input id="studentName" placeholder="名前">

<input id="studentPass" placeholder="パスワード">

<button onclick="addStudent()">追加</button>


<h2>生徒一覧</h2>

<table border="1">

<thead>
<tr>
<th>名前</th>
<th>点数</th>
<th>削除</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyDyxNXxTiEsqsyBc6yWk2SOE7-sXklWlEw",
  authDomain: "anki-test-system.firebaseapp.com",
  projectId: "anki-test-system",
  storageBucket: "anki-test-system.firebasestorage.app",
  messagingSenderId: "1084360201224",
  appId: "1:1084360201224:web:b447d41ded709f15012dbd"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let students=[];
let questions=[];
let currentSubject="";


function normalize(text){

return text
.toLowerCase()
.trim();

}


window.teacherLogin=function(){

const pass=document.getElementById("teacherPass").value;

if(pass==="008769"){

document.getElementById("loginArea").style.display="none";

document.getElementById("teacherArea").classList.remove("hidden");

loadStudents();
loadQuestions();

}else{

alert("パスワードが違います");

}

}


window.setSubject=function(){

currentSubject=document.getElementById("subjectName").value;

document.getElementById("currentSubject").textContent=currentSubject;

renderTable();
renderQuestions();

}



window.addStudent=async function(){

const name=document.getElementById("studentName").value;
const pass=document.getElementById("studentPass").value;

if(!name||!pass)return;

await addDoc(collection(db,"students"),{

name:name,
password:pass,
scores:{}

});

loadStudents();

}



async function loadStudents(){

students=[];

const snap=await getDocs(collection(db,"students"));

snap.forEach(d=>{

students.push({

id:d.id,
...d.data()

});

});

renderTable();

}



function renderTable(){

const tbody=document.getElementById("studentTable");

tbody.innerHTML="";

students.forEach((s,i)=>{

const score=currentSubject && s.scores?.[currentSubject]!==undefined
? s.scores[currentSubject]
: "";

tbody.innerHTML+=`

<tr>

<td>${s.name}</td>
<td>${score}</td>
<td><button onclick="deleteStudent(${i})">削除</button></td>

</tr>

`;

});

}



window.deleteStudent=async function(i){

await deleteDoc(doc(db,"students",students[i].id));

loadStudents();

}



window.addQuestion=async function(){

const unit=document.getElementById("unit").value;
const q=document.getElementById("questionText").value;
const raw=document.getElementById("answerText").value;

if(!currentSubject||!unit||!q||!raw)return;

const answers=raw.split(",").map(a=>a.trim());

await addDoc(collection(db,"questions"),{

subject:currentSubject,
unit:unit,
question:q,
answers:answers

});

loadQuestions();

}



async function loadQuestions(){

questions=[];

const snap=await getDocs(collection(db,"questions"));

snap.forEach(d=>{

questions.push({

id:d.id,
...d.data()

});

});

renderQuestions();

}



function renderQuestions(){

const list=document.getElementById("questionList");

list.innerHTML="";

questions
.filter(q=>q.subject===currentSubject)
.forEach(q=>{

const li=document.createElement("li");

li.innerHTML=

`${q.question}
<br>正解: ${q.answers.join("/")}

<br>
<button onclick="deleteQuestion('${q.id}')">削除</button>

<hr>
`;

list.appendChild(li);

});

}



window.deleteQuestion=async function(id){

if(confirm("この問題を削除しますか？")){

await deleteDoc(doc(db,"questions",id));

loadQuestions();

}

}

</script>

</body>
</html>
