<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>生徒ページ</title>

<style>

body{
font-family:sans-serif;
padding:10px;
}

input,button,select{
padding:10px;
font-size:16px;
margin:4px 0;
width:100%;
max-width:320px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>生徒ログイン</h1>

<select id="studentSelect"></select>

<input id="studentPass" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

<div id="studentArea" class="hidden">

<h2 id="welcome"></h2>

<button onclick="startTest()">テスト開始</button>

<h3>結果</h3>

<p id="score"></p>

<div id="testArea"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"XXXX",
appId:"XXXX"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let students=[];
let questions=[];
let loginIndex=null;

function normalize(text){

return (text||"")

.toLowerCase()
.trim()
.replace(/[　\s]/g,"")
.replace(/[。、,.]/g,"")
.replace(/です|だ|である/g,"");

}

/* 生徒読み込み */

async function loadStudents(){

const snap=await getDocs(collection(db,"students"));

snap.forEach(d=>{

students.push({

id:d.id,
...d.data()

});

});

const select=document.getElementById("studentSelect");

students.forEach((s,i)=>{

const op=document.createElement("option");

op.value=i;
op.textContent=s.name;

select.appendChild(op);

});

}

/* 問題 */

async function loadQuestions(){

const snap=await getDocs(collection(db,"questions"));

snap.forEach(d=>{

questions.push(d.data());

});

}

/* ログイン */

window.login=function(){

const i=document.getElementById("studentSelect").value;
const pass=document.getElementById("studentPass").value;

if(students[i].password!==pass){

alert("パスワード違い");
return;

}

loginIndex=i;

document.getElementById("studentArea").classList.remove("hidden");

document.getElementById("welcome").textContent=students[i].name;

}

/* テスト */

window.startTest=function(){

const area=document.getElementById("testArea");

area.innerHTML="";

questions.forEach((q,i)=>{

area.innerHTML+=`

<p>${q.question}</p>

<input id="ans_${i}">

`;

});

area.innerHTML+=`<button onclick="grade()">採点</button>`;

}

/* 採点 */

window.grade=async function(){

let correct=0;

questions.forEach((q,i)=>{

const user=normalize(document.getElementById("ans_"+i).value);

const ok=q.answers.some(ans=>

user.includes(ans)||ans.includes(user)

);

if(ok)correct++;

});

const score=Math.round(correct/questions.length*100);

document.getElementById("score").textContent=score+"点";

const student=students[loginIndex];

student.scores["test"]=score;

await updateDoc(doc(db,"students",student.id),{

scores:student.scores

});

}

loadStudents();
loadQuestions();

</script>

</body>
</html>
